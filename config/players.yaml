# Player Profiles
# Embodies the two-dimensional (Exposure × Buffer) classification framework

KOGAS:
  full_name: "Korea Gas Corporation"
  fiscal_year_end: "12-31"
  annual_volume_mt: 40.0
  supply_sources:
    qatar: 0.32
    australia: 0.22
    us_gulf: 0.18
    southeast_asia: 0.15
    other: 0.13
  buffer:
    pipeline_alternatives: 0.0          # Korea has no pipeline imports
    storage_capacity_days: 45           # total tank capacity
    domestic_production_share: 0.02
  institutional_constraints:
    - type: "UGBA_inventory_floor"
      threshold_days: 37                # 7+30 day redline (Article 10-10)
      penalty: "MOTIE emergency protocol"
      monitoring: "daily"
      trigger_rule: "7_consecutive_days_below"
    - type: "price_inversion"
      description: "Spot procurement at global prices, domestic tariff caps"
      effect: "uncollected receivables accumulation"

