# Panama Canal Drought Scenario (Layer 1: 2023.7 — 2024.8)
# Source: ACP Analysts (2024)

scenario:
  name: "Panama Canal Drought 2023-2024"
  type: "capacity_degradation"
  bottleneck: "panama_canal"
  trigger: "El Niño driven Gatun Lake drought"
  start_date: "2023-07-01"
  end_date: "2024-08-31"

# Monthly canal capacity (transits per day)
# Normal baseline: 36-38 transits/day
capacity_timeline:
  "2023-07": 32
  "2023-08": 31
  "2023-09": 30
  "2023-10": 28
  "2023-11": 24
  "2023-12": 22     # absolute trough
  "2024-01": 24
  "2024-02": 24
  "2024-03": 27
  "2024-04": 29
  "2024-05": 31
  "2024-06": 32
  "2024-07": 34
  "2024-08": 35     # near-recovery

# Key parameters
parameters:
  min_draft_ft: 44                    # ACP Neopanamax minimum draft
  lng_vessel_draft_range_ft: [36, 39.5]  # typical laden LNG vessel draft
  peak_auction_fee_usd: 4000000       # Eneos VLGC, Nov 2023
  one_slot_per_customer_per_day: true
  bog_daily_usd: 63000                # at JKM ~$15.98/MMBtu

# Market observations (for backtesting validation)
observations:
  us_asia_reroute_pct_q3_2024: 0.94   # 94% via Cape
  us_asia_export_increase_mt: 29       # +22% to 29 MT
  jkm_ttf_spread_pre: 0.6             # $/MMBtu
  jkm_ttf_spread_post: 1.3            # $/MMBtu
  spark30s_h1_2024_range: [20000, 70000]   # $/day
  spark30s_q4_2024_peak: 182000       # $/day
  new_vessel_deliveries_h1_2024: 60
